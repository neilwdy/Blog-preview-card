<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="card" aria-labelledby="card-title">
        <img
          class="card__image"
          src="assets/illustration-article.svg"
          alt="Illustration for the blog article"
        />

        <div class="card__content">
          <p class="card__tag">Learning</p>
          <p class="card__date">Published 21 Dec 2023</p>
          <h1 id="card-title">HTML &amp; CSS foundations</h1>
          <p class="card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>

          <div class="card__author">
            <img
              class="card__avatar"
              src="assets/image-avatar.webp"
              alt="Greg Hooper"
            />
            <p class="card__author-name">Greg Hooper</p>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
